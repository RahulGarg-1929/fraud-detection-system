version: "3.9"

services:
  # ──────────────────────────────────────────
  # Backend — FastAPI fraud detection API
  # ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-detection-api:dev
    container_name: fraud_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      # Mount source code for live reload during development
      - ./api:/app/api
      - ./src:/app/src
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Frontend — React / Vite (dev server)
  # ──────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: fraud_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    restart: unless-stopped
