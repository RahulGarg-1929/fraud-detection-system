name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------------------
  # Backend — Python API tests
  # ----------------------------------------------------------------------------
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Validate API imports
        run: python -c "from api.main import app; print('API import OK')"

      - name: Validate model service imports
        run: python -c "from api.model_service import FraudModelService; print('ModelService import OK')"

      - name: Check API health endpoint (demo mode)
        run: |
          python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          API_PID=$!
          sleep 10
          curl -f http://localhost:8000/health
          kill $API_PID

  # ----------------------------------------------------------------------------
  # Frontend — Node build
  # ----------------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ----------------------------------------------------------------------------
  # Docker — verify image builds successfully
  # ----------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraudshield-api:test .
