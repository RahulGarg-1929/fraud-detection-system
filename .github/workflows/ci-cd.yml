name: CI — Test & Lint

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────
  # Backend tests
  # ────────────────────────────────────────────
  backend-test:
    name: Backend — Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Validate API imports
        run: python -c "from api.main import app; print('API imports OK')"

      - name: Validate model service imports
        run: python -c "from api.model_service import FraudModelService; print('ModelService imports OK')"

      - name: Health-check endpoint smoke test
        run: |
          python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
          curl --retry 5 --retry-delay 3 -f http://localhost:8000/health
          kill %1

  # ────────────────────────────────────────────
  # Frontend tests
  # ────────────────────────────────────────────
  frontend-test:
    name: Frontend — Node lint & build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ────────────────────────────────────────────
  # Docker build verification
  # ────────────────────────────────────────────
  docker-build:
    name: Docker — build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build Docker image
        run: docker build -t fraud-detection-api:ci .
